name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Configure
        run: cmake --preset windows-release

      - name: Build
        run: cmake --build build/windows-release --config RelWithDebInfo

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: crystalserver-windows
          path: build/windows-release/bin/